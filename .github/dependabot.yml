version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/nicecli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/apps/nicecli/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/apps/cliproxyapi"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
